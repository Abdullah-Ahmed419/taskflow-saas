<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0D0D0F;--surface:#141416;--surface2:#1C1C20;--border:rgba(255,255,255,0.08);
  --text:#F0EEE9;--sub:#6B6A72;--muted:#3A3940;
  --accent:#C8F135;--accent-d:#9BBF1A;--accent-glow:rgba(200,241,53,0.12);
  --high:#FF5C5C;--r:14px;--t:.2s cubic-bezier(.4,0,.2,1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
     display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(200,241,53,0.07) 0%,transparent 60%);pointer-events:none}

.card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;
      width:100%;max-width:400px;position:relative;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent)}

.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;text-decoration:none}
.logo-box{width:32px;height:32px;background:var(--accent);border-radius:9px;display:flex;
          align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#0D0D0F}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.5px;color:var(--text)}

h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.sub{font-size:14px;color:var(--sub);margin-bottom:28px}

.f-row{margin-bottom:16px}
.f-lbl{display:block;font-size:11px;font-weight:600;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.f-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
       padding:12px 14px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:all var(--t)}
.f-inp::placeholder{color:var(--muted)}
.f-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

.btn-primary{width:100%;padding:13px;border-radius:var(--r);border:none;background:var(--accent);
             color:#0D0D0F;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
             transition:all var(--t);margin-top:4px}
.btn-primary:hover{background:var(--accent-d);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.success-box{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);border-radius:10px;
             padding:14px;font-size:14px;color:#4ADE80;display:none;text-align:center;margin-bottom:16px}
.success-box.show{display:block}

.switch{text-align:center;margin-top:22px;font-size:13px;color:var(--sub)}
.switch a{color:var(--accent);text-decoration:none;font-weight:600}
.switch a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="/login">
    <div class="logo-box">✓</div>
    <div class="logo-text">TaskFlow</div>
  </a>

  <h1>Forgot password?</h1>
  <p class="sub">Enter your email and we'll send a reset link.</p>

  <div class="success-box" id="successBox">
    ✅ Check your inbox — a reset link is on its way.
  </div>

  <div class="f-row">
    <label class="f-lbl">Email Address</label>
    <input class="f-inp" id="fEmail" type="email" placeholder="you@example.com" autocomplete="email">
  </div>

  <button class="btn-primary" id="submitBtn" onclick="submit()">Send Reset Link</button>

  <div class="switch">
    Remember it? <a href="/login">Sign in</a>
  </div>
</div>

<script>
async function submit() {
  const email = document.getElementById('fEmail').value.trim();
  if (!email) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  await fetch('/api/auth/forgot-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email }),
  });

  // Always show success (no email enumeration)
  document.getElementById('successBox').classList.add('show');
  btn.textContent = 'Sent!';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
